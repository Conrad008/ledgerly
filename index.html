<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledgerly</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen pb-12">
    <header class="bg-white border-b border-zinc-200 py-6 mb-6 md:mb-10 shadow-xs">
        <div class="w-[92%] max-w-6xl mx-auto">
            <h1 class="text-5xl font-bold tracking-tight text-zinc-900">
                Ledgerly<span class="text-zinc-400">.</span>
            </h1>
            <p class="text-lg text-zinc-500">Take control of your daily financial habits</p>
        </div>
    </header>
    <main class="w-[92%] max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-6 md:gap-8">
        <section class="bg-white border border-zinc-200 rounded-xl p-5 md:p-6 shadow-xs md:col-span-4 h-fit">
            <h2 class="text-lg font-semibold tracking-tight text-zinc-900 mb-5">Log New Expense</h2>
            <form class="space-y-4 md:space-y-5" id="expense-form">
                <div class="flex flex-col gap-2">
                    <label for="expense-desc" class="text-xs font-semibold uppercase tracking-wider text-zinc-400">Description</label>
                    <input type="text" id="expense-desc" placeholder="e.g., shopping, Gas, school fees" required
                        class="w-full text-sm px-4 py-2.5 border border-zinc-200 rounded-lg bg-white text-zinc-900 focus:outline-hidden focus:border-zinc-900 focus:ring-3 focus:ring-zinc-100 transition-all">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="flex flex-col gap-2">
                        <label for="expense-amount" class="text-xs font-semibold uppercase tracking-wider text-zinc-400">Amount (/=)</label>
                        <input type="number" id="expense-amount" step="10" min="0" placeholder="0" required
                            class="w-full text-sm px-4 py-2.5 border border-zinc-200 rounded-lg bg-white text-zinc-900 focus:outline-hidden focus:border-zinc-900 focus:ring-3 focus:ring-zinc-100 transition-all">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label for="expense-category" class="text-xs font-semibold uppercase tracking-wider text-zinc-400">Category</label>
                        <select id="expense-category" required
                            class="w-full text-sm px-4 py-2.5 border border-zinc-200 rounded-lg bg-white text-zinc-900 focus:outline-hidden focus:border-zinc-900 focus:ring-3 focus:ring-zinc-100 transition-all">
                            <option value="" disabled selected>Select...</option>
                            <option value="Food">Food & Dining</option>
                            <option value="Transport">Transport</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Utilities">Utilities & Bills</option>
                            <option value="Education">Education</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

            </form>
            
        </section>

    </main>
    
</body>
</html>
